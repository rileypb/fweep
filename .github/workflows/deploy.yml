name: Build and Deploy

on:
  push:
    branches:
      - main # Triggers the workflow on pushes to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a recent Node.js version

      - name: Install dependencies
        run: npm install # or yarn install if you use yarn

      - name: Build React app
        run: npm run build # Creates the build folder

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3 # A popular action for deployment
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build # Directory to deploy (might be ./dist for Vite apps)
          publish_branch: gh-pages # The branch to deploy the static files to
